[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "soterion-edge"
version = "0.1.0"
description = "Soterion Edge SDK - Connect any LiDAR sensor to the Soterion cloud platform"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.25",
    "pydantic>=2.0",
    "numpy>=1.24",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]
