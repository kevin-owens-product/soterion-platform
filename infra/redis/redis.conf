# Soterion Redis Configuration

# Memory limit
maxmemory 256mb

# Eviction policy — remove least recently used keys when memory is full
maxmemory-policy allkeys-lru

# Persistence — append-only file for durability
appendonly yes
appendfsync everysec

# Networking
bind 0.0.0.0
protected-mode yes
tcp-keepalive 300

# Logging
loglevel notice
