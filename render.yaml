services:
  - type: web
    name: soterion-api
    runtime: node
    buildCommand: cd apps/api && npm install && npm run build
    startCommand: cd apps/api && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: soterion-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soterion-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        fromService:
          name: soterion-ml
          type: web
          property: host

  - type: web
    name: soterion-web
    runtime: static
    buildCommand: cd apps/web && npm install && npm run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://soterion-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: soterion-ml
    runtime: python
    buildCommand: cd services/ml && pip install -r requirements.txt
    startCommand: cd services/ml && uvicorn app.main:app --host 0.0.0.0 --port $PORT

databases:
  - name: soterion-db
    databaseName: soterion
    plan: standard

  - name: soterion-redis
    type: redis
    plan: standard
